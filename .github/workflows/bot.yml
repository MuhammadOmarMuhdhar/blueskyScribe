name: Bluesky Scribe Bot

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLUESKY_USERNAME: ${{ secrets.BLUESKY_USERNAME }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: python check_mentions.py

      - name: Commit state
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update: bot state [skip ci]"
          file_pattern: state.json
          commit_user_name: bsky-scribe-bot
          commit_user_email: bot@bskyscribe.local
          commit_author: bsky-scribe-bot <bot@bskyscribe.local>
